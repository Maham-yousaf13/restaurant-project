{% extends 'base.html' %}
{% load static %}

{% block title %}Thank You - AMECO Restaurant{% endblock %}

{% block content %}
<div class="pt-20 pb-16 bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-xl shadow-lg p-12 text-center">
            
            <!-- Success Icon -->
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-heart text-5xl text-green-600"></i>
            </div>
            
            <h1 class="text-3xl font-playfair font-bold text-gray-900 mb-2">Thank You! 🙏</h1>
            <p class="text-gray-600 text-lg mb-2">Your feedback means a lot to us!</p>
            <p class="text-gray-500 mb-6">We appreciate you taking the time to share your experience.</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{% url 'home' %}" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition">
                    <i class="fas fa-home mr-2"></i> Back to Home
                </a>
                <a href="{% url 'menu_list' %}" class="border-2 border-gray-300 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-utensils mr-2"></i> Browse Menu
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
