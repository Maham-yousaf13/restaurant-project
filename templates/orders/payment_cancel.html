{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Cancelled - AMECO Restaurant{% endblock %}

{% block content %}
<div class="pt-20 pb-16 bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-white rounded-xl shadow-lg p-12 text-center">
            
            <!-- Cancel Icon -->
            <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-times text-5xl text-red-600"></i>
            </div>
            
            <h1 class="text-3xl font-playfair font-bold text-gray-900 mb-2">Payment Cancelled</h1>
            <p class="text-gray-600 text-lg mb-2">Order #{{ order.order_number }}</p>
            <p class="text-gray-500 mb-6">Your payment was cancelled. You can try again anytime.</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="{% url 'payment_page' order.id %}" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition">
                    <i class="fas fa-credit-card mr-2"></i> Try Again
                </a>
                <a href="{% url 'home' %}" class="border-2 border-gray-300 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-home mr-2"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
